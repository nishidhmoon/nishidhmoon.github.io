<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening MoonHRM...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      margin: 30px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top: 4px solid #0078D4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a.fallback-btn {
      display: none;
      margin-top: 20px;
      background: #0078D4;
      color: white;
      padding: 12px 24px;
      border-radius: 6px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h2>Opening MoonHRM App...</h2>
  <div class="spinner"></div>
  <p id="status">Redirecting you to the app.</p>

  <a id="fallback" class="fallback-btn" href="https://yourapp.com/download">
    Download MoonHRM
  </a>

  <script>
    // 1. Read the path/query from this page's own URL
    //    e.g. https://yourapp.com/product/123 -> forward "/product/123"
    const path = window.location.pathname + window.location.search;

    // 2. Build the custom scheme link
    const appLink = "moonhrm://" + path.replace(/^\/+/, "");

    // 3. Try opening the app
    window.location.href = appLink;

    // 4. If the app doesn't open within ~1.5s, assume it's not installed
    //    and show a fallback (download page, web version, etc.)
    setTimeout(function () {
      document.getElementById("status").innerText =
        "App didn't open? You may not have it installed.";
      document.getElementById("fallback").style.display = "inline-block";
    }, 1500);
  </script>
</body>
</html>
